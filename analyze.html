<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyze | VendorRisk AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
     <link rel="icon" type="image/png" href="assets\icon.png">
    <style>
        :root {
            --dark-blue: #0A1128;
            --light-blue: #0077B6;
            --accent-blue: #00B4D8;
            --text-white: #E0FBFC;
            --text-light-gray: #B3C4EF;
            --glow-color: rgba(0, 180, 216, 0.5);
            --card-bg: rgba(16, 26, 58, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--dark-blue); 
            color: var(--text-white); 
            font-family: 'Inter', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh;
        }

        nav {
            width: 100%; height: 70px; border-bottom: 1px solid var(--light-blue);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; background: rgba(10, 17, 40, 0.9); backdrop-filter: blur(10px);
        }
        .logo { font-weight: 700; color: var(--accent-blue); font-size: 1.3rem; }
        .nav-links a { text-decoration: none; color: var(--text-light-gray); margin-left: 20px; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent-blue); }

        .scan-container { 
            background: var(--card-bg); border: 1px solid var(--light-blue); 
            border-radius: 24px; padding: 40px; width: 95%; max-width: 500px; 
            margin-top: 80px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h2 { margin-bottom: 10px; font-weight: 700; text-align: center; }
        .subtitle { color: var(--text-light-gray); font-size: 0.85rem; margin-bottom: 30px; text-align: center; }

        .label { 
            font-size: 0.75rem; color: var(--accent-blue); 
            text-transform: uppercase; letter-spacing: 1px; 
            margin-bottom: 8px; display: block; font-weight: 600;
        }

        input, select { 
            width: 100%; padding: 14px; background: #050a1a; 
            border: 1px solid var(--light-blue); color: white; 
            border-radius: 12px; outline: none; margin-bottom: 25px;
            font-size: 1rem; transition: 0.3s; appearance: none;
        }
        input:focus, select:focus { border-color: var(--accent-blue); box-shadow: 0 0 15px var(--glow-color); }

        /* Custom Dropdown Arrow */
        .select-wrapper { position: relative; }
        .select-wrapper::after {
            content: '\f107'; font-family: 'Font Awesome 5 Free'; font-weight: 900;
            position: absolute; right: 15px; top: 15px; color: var(--accent-blue); pointer-events: none;
        }

        .btn-analyze { 
            width: 100%; padding: 18px; background: var(--light-blue); 
            color: white; border: none; border-radius: 12px; 
            font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 1rem;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-analyze:hover { background: var(--accent-blue); box-shadow: 0 0 20px var(--glow-color); }

        /* Terminal Results */
        #terminal-box {
            display: none; background: #02050d; border-radius: 15px;
            padding: 25px; margin-top: 30px; border: 1px solid rgba(0, 180, 216, 0.3);
            font-family: 'Courier New', monospace;
        }
        .report-line { margin-bottom: 6px; font-size: 0.85rem; color: var(--accent-blue); }
        
        .result-card {
            background: rgba(0, 180, 216, 0.1); border: 1px solid var(--accent-blue);
            padding: 15px; border-radius: 10px; margin-top: 15px;
        }

        .btn-proceed {
            display: none; width: 100%; padding: 15px; background: #2ed573;
            color: #0A1128; border: none; border-radius: 10px; font-weight: 800;
            cursor: pointer; margin-top: 20px; text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-proceed:hover { background: #1eb960; transform: translateY(-2px); }

        


        .footer {
    background-color: var(--dark-blue);
    color: var(--text-light-gray);
    padding: 50px 0 30px;
    text-align: center;
    border-top: 1px solid rgba(0, 180, 216, 0.1);
}

.footer-brand {
    font-size: 1.8rem;
    font-weight: bold;
    color: var(--text-white);
    letter-spacing: 1px;
    margin-bottom: 15px;
}

.footer-description {
    max-width: 600px;
    margin: 0 auto 30px;
    font-size: 0.95rem;
    line-height: 1.8;
}

.footer-links {
    list-style: none;
    margin: 0 0 30px 0;
    padding: 0;
    display: flex;
    justify-content: center;
    gap: 30px;
}

.footer-links a {
    color: var(--text-white);
    font-weight: 500;
}

.footer-links a:hover {
    color: var(--accent-blue);
}
.footer-logo {
    height: 70px;
    width: auto;
}

.footer-bottom {
    border-top: 1px solid rgba(0, 180, 216, 0.05);
    padding-top: 20px;
    margin-top: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}

.footer-bottom p {
    margin: 0;
    font-size: 0.85rem;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: bold;
}

.logo img {
    width: 60px;   /* adjust size */
    height: 60px;
    object-fit: contain;
}
.logo span {
    color: var(--accent-blue);
}
    </style>

<body>

    <nav>
        <div class="logo">
    <img src="assets/logo.png" alt="VendorRisk AI Logo">
    <span>VendorRisk-AI</span>
</div>
        <div class="nav-links"><a href="index.html">Home</a><a href="analyze.html">Analyze</a><a href="dashboard.html">Dashboard</a></div>
    </nav>

    <div class="scan-container">
        <h2>Risk Analysis</h2>
        <p class="subtitle">Real-time CVE Intelligence Gathering</p>

        <span class="label">Vendor Name</span>
        <input type="text" id="vName" placeholder="Search Vendor (e.g. Microsoft)">

        <span class="label">Industry Vertical</span>
        <div class="select-wrapper">
            <select id="vInd">
                <option value="" disabled selected>Select Industry Sector</option>
                <optgroup label="Technology">
                    <option value="SaaS">Cloud / SaaS</option>
                    <option value="Cybersecurity">Cybersecurity</option>
                    <option value="FinTech">FinTech</option>
                </optgroup>
                <optgroup label="Critical">
                    <option value="Healthcare">Healthcare</option>
                    <option value="Finance">Banking & Finance</option>
                    <option value="Government">Government / Defense</option>
                </optgroup>
                <optgroup label="Services">
                    <option value="Retail">E-commerce / Retail</option>
                    <option value="Manufacturing">Manufacturing</option>
                    <option value="Education">Education</option>
                </optgroup>
            </select>
        </div>

        <button class="btn-analyze" id="scanBtn" onclick="runAnalysis()">
            <i class="fas fa-search-shield"></i> Run Security Audit
        </button>

        <div id="terminal-box">
            <div id="termContent"></div>
            <button class="btn-proceed" id="proceedBtn" onclick="location.href='dashboard.html'">
                Enter Control Center <i class="fas fa-sign-in-alt"></i>
            </button>
        </div>
    </div>
      <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <!-- <div class="footer-brand">VendorRisk AI</div> -->
             <div class="footer-brand">
    <img src="assets/logo.png" alt="VendorRisk AI Logo" class="footer-logo">
</div>
            <p class="footer-description">AI-powered platform securing your supply chain by evaluating third-party vendor risks.</p>
           
            <div class="footer-bottom">
                <p>&copy; 2026 VendorRisk-AI. All rights reserved. <span class="developer-text">Jamuna.T.G</span></p>
                <div class="social-links">
                    <!-- Placeholder for GitHub and contact links -->
                    <!-- <a href="#" aria-label="GitHub"><i class="fab fa-github icon-placeholder"></i></a>
                    <a href="#" aria-label="Contact"><i class="fas fa-envelope icon-placeholder"></i></a> -->
                </div>
            </div>
        </div>
    </footer>

    <script>
        async function runAnalysis() {
            const name = document.getElementById('vName').value;
            const industry = document.getElementById('vInd').value;
            
            if(!name || !industry) {
                alert("Please fill in both Vendor Name and Industry.");
                return;
            }

            // UI Setup
            const scanBtn = document.getElementById('scanBtn');
            const term = document.getElementById('terminal-box');
            const content = document.getElementById('termContent');
            
            scanBtn.style.display = 'none';
            term.style.display = 'block';
            content.innerHTML = "";

            const logs = [
                `> INITIALIZING HANDSHAKE...`,
                `> QUERYING NIST NVD CLUSTER...`,
                `> ANALYZING ${industry.toUpperCase()} VECTORS...`,
                `> GENERATING RISK PROFILE...`
            ];

            // Animation
            for(let log of logs) {
                const p = document.createElement('div');
                p.className = "report-line";
                p.innerText = log;
                content.appendChild(p);
                await new Promise(r => setTimeout(r, 400));
            }

            try {
                // Real Data Fetch
                const response = await fetch(`https://services.nvd.nist.gov/rest/json/cves/2.0?keywordSearch=${name}`);
                const data = await response.json();
                const total = data.totalResults || 0;
                
                // Logic
                let score = total > 50 ? 84 : (total > 10 ? 51 : 16);
                let level = score >= 70 ? "High" : (score >= 40 ? "Medium" : "Low");
                let color = score >= 70 ? "#ff4757" : (score >= 40 ? "#ffa502" : "#2ed573");

                // Save to Storage
                const storage = JSON.parse(localStorage.getItem("vendorData")) || [];
                storage.unshift({ name, industry, score, riskLevel: level, date: new Date().toLocaleDateString() });
                localStorage.setItem("vendorData", JSON.stringify(storage));

                // Final UI Block
                content.innerHTML += `
                    <div class="result-card">
                        <p style="color:white; font-weight:bold; font-size:0.75rem; margin-bottom:5px;">[AUDIT COMPLETE]</p>
                        <p style="font-size:0.8rem; margin-bottom:10px;">Vulnerabilities: ${total}</p>
                        <div style="font-weight:bold; color:${color}; font-size:1.1rem;">
                            RISK: ${level.toUpperCase()} (${score}/100)
                        </div>
                    </div>
                `;

                // Show the Manual Button
                document.getElementById('proceedBtn').style.display = 'block';

            } catch(e) {
                content.innerHTML += `<p style="color:#ff4757">> API ERROR. PROCEED TO MANUAL CHECK.</p>`;
                document.getElementById('proceedBtn').style.display = 'block';
            }
        }
    </script>
