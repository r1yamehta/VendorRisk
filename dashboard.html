<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | VendorRisk AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
     <link rel="icon" type="image/png" href="assets\icon.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --dark-blue: #0A1128;
            --light-blue: #0077B6;
            --accent-blue: #00B4D8;
            --text-white: #E0FBFC;
            --text-light-gray: #B3C4EF;
            --glow-color: rgba(0, 180, 216, 0.5);
            --card-bg: rgba(16, 26, 58, 0.8);
            --header-height: 70px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--dark-blue);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Navbar */
        nav {
            height: var(--header-height);
            background: rgba(10, 17, 40, 0.9);
            border-bottom: 1px solid var(--light-blue);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .logo { font-weight: 700; color: var(--accent-blue); font-size: 1.3rem; }
        .nav-links a { text-decoration: none; color: var(--text-light-gray); margin-left: 20px; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a.active, .nav-links a:hover { color: var(--accent-blue); text-shadow: 0 0 10px var(--glow-color); }

        .container { max-width: 1200px; margin: 100px auto 50px; padding: 0 20px; }

        /* Stats Section */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--light-blue);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .stat-card:hover { transform: translateY(-5px); border-color: var(--accent-blue); box-shadow: 0 0 20px var(--glow-color); }
        .stat-card i { font-size: 1.8rem; color: var(--accent-blue); margin-bottom: 10px; }
        .stat-card h3 { font-size: 0.8rem; color: var(--text-light-gray); text-transform: uppercase; }
        .stat-card .value { font-size: 2.2rem; font-weight: 700; margin-top: 5px; }

        /* Main Grid */
        .dashboard-main { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .panel { background: var(--card-bg); border: 1px solid var(--light-blue); border-radius: 15px; padding: 25px; }

        /* Table */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: var(--text-light-gray); font-size: 0.85rem; padding: 12px; border-bottom: 1px solid var(--light-blue); }
        td { padding: 15px 12px; border-bottom: 1px solid rgba(0, 119, 182, 0.2); font-size: 0.9rem; }
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; }
        .high { background: rgba(255, 71, 87, 0.2); color: #ff4757; }
        .medium { background: rgba(255, 165, 2, 0.2); color: #ffa502; }
        .low { background: rgba(46, 213, 115, 0.2); color: #2ed573; }

        /* Empty State */
        #emptyState { text-align: center; padding: 100px 0; display: none; }
        .btn-go { background: var(--light-blue); color: white; padding: 12px 25px; border-radius: 8px; text-decoration: none; display: inline-block; margin-top: 20px; }

        @media (max-width: 900px) { .dashboard-main { grid-template-columns: 1fr; } }

        .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: bold;
}

.logo img {
    width: 40px;   /* adjust size */
    height: 40px;
    object-fit: contain;
}

.logo span {
    color: var(--accent-blue);
}
    </style>
</head>
<body>
    <nav>
         <div class="logo">
    <img src="assets/logo.png" alt="VendorRisk AI Logo">
    <span>VendorRisk-AI</span>
</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="analyze.html">Analyze</a>
            <a href="dashboard.html" class="active">Dashboard</a>
        </div>
    </nav>

    <div class="container">
        <div id="dashboardContent">
            <header style="margin-bottom: 30px;">
                <h1>Dashboard</h1>
                <p style="color: var(--text-light-gray)">Real-time vendor risk intelligence</p>
            </header>

            <div class="stats-grid">
                <div class="stat-card"><i class="fas fa-database"></i><h3>Total</h3><div class="value" id="t-count">0</div></div>
                <div class="stat-card"><i class="fas fa-shield-alt" style="color:#ff4757"></i><h3>High</h3><div class="value" id="h-count">0</div></div>
                <div class="stat-card"><i class="fas fa-exclamation-circle" style="color:#ffa502"></i><h3>Medium</h3><div class="value" id="m-count">0</div></div>
                <div class="stat-card"><i class="fas fa-check-circle" style="color:#2ed573"></i><h3>Low</h3><div class="value" id="l-count">0</div></div>
            </div>

            <div class="dashboard-main">
                <div class="panel">
                    <h3>Vendor Inventory</h3>
                    <table>
    <thead>
        <tr>
            <th>Vendor</th>
            <th>Industry</th>
            <th>Score</th>
            <th>Risk</th>
            <th>Action</th> </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>
                </div>
                <div class="panel">
                    <h3>Risk Distribution</h3>
                    <canvas id="riskChart" style="margin-top:20px;"></canvas>
                </div>
            </div>
        </div>

        <div id="emptyState">
            <h2>No Data Found</h2>
            <p>You haven't analyzed any vendors yet.</p>
            <a href="analyze.html" class="btn-go">Analyze Now</a>
        </div>
    </div>

   
    <script>
        // --- PUT THIS INSIDE YOUR <script> TAG IN dashboard.html ---

let data = JSON.parse(localStorage.getItem("vendorData")) || [];

function deleteRecord(index) {
    if(confirm("Are you sure you want to delete this vendor assessment?")) {
        data.splice(index, 1); // Remove item from array
        localStorage.setItem("vendorData", JSON.stringify(data)); // Update storage
        loadDashboard(); // Refresh the page UI
    }
}

function loadDashboard() {
    // Refresh the data variable from storage
    data = JSON.parse(localStorage.getItem("vendorData")) || [];
    
    const content = document.getElementById('dashboardContent');
    const empty = document.getElementById('emptyState');

    if (data.length === 0) {
        content.style.display = 'none';
        empty.style.display = 'block';
        return;
    }

    content.style.display = 'block';
    empty.style.display = 'none';

    // Calculate totals for cards
    const high = data.filter(v => v.riskLevel === 'High').length;
    const mid = data.filter(v => v.riskLevel === 'Medium').length;
    const low = data.filter(v => v.riskLevel === 'Low').length;

    document.getElementById('t-count').innerText = data.length;
    document.getElementById('h-count').innerText = high;
    document.getElementById('m-count').innerText = mid;
    document.getElementById('l-count').innerText = low;

    // Populate Table
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = data.map((v, index) => `
        <tr>
            <td>${v.name}</td>
            <td>${v.industry}</td>
            <td style="font-weight:bold">${v.score}</td>
            <td><span class="badge ${v.riskLevel.toLowerCase()}">${v.riskLevel}</span></td>
            <td>
                <button onclick="deleteRecord(${index})" style="background:none; border:none; color:#ff4757; cursor:pointer; font-size:1rem;">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </td>
        </tr>
    `).join('');

    updateChart(high, mid, low);
}

// Chart.js Logic
let myChart;
function updateChart(h, m, l) {
    const ctx = document.getElementById('riskChart').getContext('2d');
    if(myChart) myChart.destroy(); // Clear old chart before drawing new one
    
    myChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['High', 'Medium', 'Low'],
            datasets: [{
                data: [h, m, l],
                backgroundColor: ['#ff4757', '#ffa502', '#2ed573'],
                borderWidth: 0,
                cutout: '75%'
            }]
        },
        options: {
            plugins: { 
                legend: { 
                    position: 'bottom', 
                    labels: { color: '#E0FBFC', padding: 20 } 
                } 
            }
        }
    });
}

// Start the dashboard when the page loads
window.onload = loadDashboard;
    </script>
</body>
</html>
