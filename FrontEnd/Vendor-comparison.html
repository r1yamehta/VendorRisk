<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Vendors | VendorRisk AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="icon" type="image/png" href="assets/icon.png">
    <style>
        :root {
            --dark-blue: #0A1128;
            --light-blue: #0077B6;
            --accent-blue: #00B4D8;
            --text-white: #E0FBFC;
            --text-light-gray: #B3C4EF;
            --glow-color: rgba(0, 180, 216, 0.5);
            --card-bg: rgba(16, 26, 58, 0.8);
            --high-risk: #ff4757;
            --medium-risk: #ffa502;
            --low-risk: #2ed573;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--dark-blue); 
            color: var(--text-white); 
            font-family: 'Inter', sans-serif;
        }

        nav {
            width: 100%; height: 70px; border-bottom: 1px solid var(--light-blue);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; background: rgba(10, 17, 40, 0.9); backdrop-filter: blur(10px);
            position: fixed; top: 0; z-index: 1000;
        }
        .logo { 
            display: flex; align-items: center; gap: 10px;
            font-weight: 700; color: var(--accent-blue); font-size: 1.3rem; 
        }
        .logo img { width: 40px; height: 40px; object-fit: contain; }
        .nav-links a { text-decoration: none; color: var(--text-light-gray); margin-left: 20px; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent-blue); }

        .container {
            max-width: 1400px;
            margin: 100px auto 50px;
            padding: 0 20px;
        }

        /* Comparison Header */
        .comparison-header {
            background: var(--card-bg);
            border: 1px solid var(--light-blue);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .comparison-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .comparison-subtitle {
            color: var(--text-light-gray);
            margin-bottom: 25px;
        }

        /* Vendor Selector */
        .vendor-selector {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .selector-card {
            flex: 1;
            min-width: 250px;
            background: rgba(0, 180, 216, 0.05);
            border: 1px solid var(--light-blue);
            border-radius: 16px;
            padding: 20px;
        }

        .selector-label {
            font-size: 0.7rem;
            color: var(--accent-blue);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .vendor-select {
            width: 100%;
            padding: 12px;
            background: #050a1a;
            border: 1px solid var(--light-blue);
            color: white;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
        }

        .compare-btn {
            background: var(--light-blue);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        .compare-btn:hover {
            background: var(--accent-blue);
            transform: translateY(-2px);
        }

        /* Comparison Grid */
        .comparison-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .vendor-card {
            background: var(--card-bg);
            border: 1px solid var(--light-blue);
            border-radius: 20px;
            padding: 25px;
            transition: 0.3s;
        }

        .vendor-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 180, 216, 0.2);
        }

        .vendor-card.winner {
            border: 2px solid #2ed573;
            position: relative;
        }

        .winner-badge {
            position: absolute;
            top: -12px;
            right: 20px;
            background: #2ed573;
            color: #0A1128;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .vendor-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: var(--accent-blue);
        }

        .vendor-industry {
            font-size: 0.8rem;
            color: var(--text-light-gray);
            margin-bottom: 20px;
        }

        /* Risk Score Circle */
        .risk-circle-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .risk-circle {
            width: 140px;
            height: 140px;
            position: relative;
        }

        .risk-circle svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .risk-circle circle {
            fill: none;
            stroke-width: 8;
        }

        .risk-circle .bg {
            stroke: rgba(255,255,255,0.1);
        }

        .risk-circle .progress {
            stroke-linecap: round;
            transition: stroke-dasharray 1s ease;
        }

        .risk-score-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .risk-score-number {
            font-size: 2rem;
            font-weight: 700;
        }

        .risk-score-label {
            font-size: 0.7rem;
            color: var(--text-light-gray);
        }

        /* Risk Level Badge */
        .risk-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin: 15px 0;
        }

        .risk-high { background: rgba(255, 71, 87, 0.2); color: #ff4757; border: 1px solid #ff4757; }
        .risk-medium { background: rgba(255, 165, 2, 0.2); color: #ffa502; border: 1px solid #ffa502; }
        .risk-low { background: rgba(46, 213, 115, 0.2); color: #2ed573; border: 1px solid #2ed573; }

        /* Factor Bars */
        .factors-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 180, 216, 0.2);
        }

        .factor-title {
            font-size: 0.75rem;
            color: var(--accent-blue);
            margin-bottom: 15px;
        }

        .factor-row {
            margin-bottom: 12px;
        }

        .factor-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            margin-bottom: 5px;
        }

        .factor-bar-bg {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .factor-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 1s ease;
        }

        /* Stats Row */
        .stats-row {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 15px;
            background: rgba(0, 180, 216, 0.05);
            border-radius: 12px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--text-light-gray);
        }

        /* Recommendation */
        .recommendation-box {
            background: linear-gradient(135deg, rgba(0, 180, 216, 0.1), rgba(0, 119, 182, 0.1));
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            text-align: center;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px;
            background: var(--card-bg);
            border-radius: 20px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2ed573;
            color: #0A1128;
            padding: 12px 20px;
            border-radius: 8px;
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 2000;
        }

        .toast.error { background: #ff4757; color: white; }

        @media (max-width: 900px) {
            .comparison-grid { grid-template-columns: 1fr; }
            .vendor-selector { flex-direction: column; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <img src="assets/logo.png" alt="VendorRisk AI Logo" onerror="this.style.display='none'">
            <span>VendorRisk-AI</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="analyze.html">Analyze</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="compare.html" class="active">Compare</a>
        </div>
    </nav>

    <div class="container">
        <div class="comparison-header">
            <div class="comparison-title">
                <i class="fas fa-balance-scale"></i> Vendor Comparison
            </div>
            <div class="comparison-subtitle">
                Compare security risk profiles of multiple vendors side-by-side
            </div>

            <div class="vendor-selector" id="vendorSelector">
                <div class="selector-card">
                    <div class="selector-label"><i class="fas fa-building"></i> Vendor 1</div>
                    <select id="vendor1Select" class="vendor-select">
                        <option value="">Select Vendor</option>
                    </select>
                </div>
                <div class="selector-card">
                    <div class="selector-label"><i class="fas fa-building"></i> Vendor 2</div>
                    <select id="vendor2Select" class="vendor-select">
                        <option value="">Select Vendor</option>
                    </select>
                </div>
                <div class="selector-card">
                    <div class="selector-label"><i class="fas fa-building"></i> Vendor 3 (Optional)</div>
                    <select id="vendor3Select" class="vendor-select">
                        <option value="">Select Vendor</option>
                    </select>
                </div>
            </div>

            <button class="compare-btn" onclick="compareVendors()">
                <i class="fas fa-chart-line"></i> Compare Vendors
            </button>
        </div>

        <div id="comparisonResults"></div>
    </div>

    <div id="toast" class="toast">
        <i class="fas fa-info-circle"></i>
        <span>Message</span>
    </div>

    <script>
        const API_BASE = 'http://localhost:5001';

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.querySelector('span').innerText = message;
            toast.className = 'toast ' + type;
            toast.style.display = 'flex';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        // Load vendors from database
        async function loadVendors() {
            try {
                const response = await fetch(`${API_BASE}/api/vendors`);
                const data = await response.json();
                const vendors = data.data || [];

                if (vendors.length === 0) {
                    document.getElementById('comparisonResults').innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-database" style="font-size: 3rem; margin-bottom: 15px;"></i>
                            <h3>No Vendors Found</h3>
                            <p>Go to Analyze page to add vendors first.</p>
                            <a href="analyze.html" style="color: var(--accent-blue);">Start Analysis →</a>
                        </div>
                    `;
                    return;
                }

                // Populate dropdowns
                const vendorOptions = vendors.map(v => `<option value="${v.id}">${v.name} (${v.risk_level} - ${v.risk_score})</option>`).join('');
                
                document.getElementById('vendor1Select').innerHTML = '<option value="">Select Vendor</option>' + vendorOptions;
                document.getElementById('vendor2Select').innerHTML = '<option value="">Select Vendor</option>' + vendorOptions;
                document.getElementById('vendor3Select').innerHTML = '<option value="">Select Vendor</option>' + vendorOptions;

            } catch (error) {
                console.error('Error loading vendors:', error);
                showToast('Failed to load vendors', 'error');
            }
        }

        // Get factor color
        function getFactorColor(score, max = 25) {
            const percentage = (score / max) * 100;
            if (percentage >= 70) return '#ff4757';
            if (percentage >= 40) return '#ffa502';
            return '#2ed573';
        }

        // Get risk color for circle
        function getRiskColor(score) {
            if (score >= 70) return '#ff4757';
            if (score >= 40) return '#ffa502';
            return '#2ed573';
        }

        // Calculate winner
        function findWinner(vendors) {
            const validVendors = vendors.filter(v => v);
            if (validVendors.length === 0) return null;
            return validVendors.reduce((best, current) => 
                (current.risk_score < best.risk_score) ? current : best, validVendors[0]);
        }

        // Render vendor card
        function renderVendorCard(vendor, isWinner = false) {
            if (!vendor) return null;
            
            const riskColor = getRiskColor(vendor.risk_score);
            const riskClass = vendor.risk_level === 'High' ? 'risk-high' : (vendor.risk_level === 'Medium' ? 'risk-medium' : 'risk-low');
            
            // Parse factor breakdown
            let factors = {};
            try {
                factors = typeof vendor.factor_breakdown === 'string' ? JSON.parse(vendor.factor_breakdown) : (vendor.factor_breakdown || {});
            } catch(e) {
                factors = {};
            }

            const circumference = 2 * Math.PI * 60;
            const dashArray = (vendor.risk_score / 100) * circumference;

            return `
                <div class="vendor-card ${isWinner ? 'winner' : ''}">
                    ${isWinner ? '<div class="winner-badge"><i class="fas fa-trophy"></i> Lowest Risk</div>' : ''}
                    
                    <div class="vendor-name">${vendor.name}</div>
                    <div class="vendor-industry"><i class="fas fa-chart-line"></i> ${vendor.industry || 'N/A'}</div>
                    
                    <div class="risk-circle-container">
                        <div class="risk-circle">
                            <svg viewBox="0 0 140 140">
                                <circle class="bg" cx="70" cy="70" r="60" stroke="rgba(255,255,255,0.1)" stroke-width="8" fill="none"/>
                                <circle class="progress" cx="70" cy="70" r="60" stroke="${riskColor}" 
                                        stroke-width="8" fill="none" stroke-dasharray="0 ${circumference}" 
                                        stroke-linecap="round"/>
                            </svg>
                            <div class="risk-score-text">
                                <div class="risk-score-number" style="color: ${riskColor};">${vendor.risk_score}</div>
                                <div class="risk-score-label">Risk Score</div>
                            </div>
                        </div>
                    </div>
                    
                    <div style="text-align: center;">
                        <span class="risk-badge ${riskClass}"><i class="fas fa-exclamation-triangle"></i> ${vendor.risk_level} RISK</span>
                    </div>
                    
                    <div class="stats-row">
                        <div class="stat-item">
                            <div class="stat-value">${vendor.vulnerabilities || 0}</div>
                            <div class="stat-label">CVEs Found</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${vendor.avg_severity || 'N/A'}</div>
                            <div class="stat-label">Avg Severity</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${vendor.critical_count || 0}</div>
                            <div class="stat-label">Critical CVEs</div>
                        </div>
                    </div>
                    
                    <div class="factors-section">
                        <div class="factor-title"><i class="fas fa-chart-simple"></i> Risk Factor Analysis</div>
                        
                        <div class="factor-row">
                            <div class="factor-header">
                                <span>Vulnerability Count</span>
                                <span style="color: ${getFactorColor(factors.countScore || 10, 25)}">${factors.countScore || 10}/25</span>
                            </div>
                            <div class="factor-bar-bg">
                                <div class="factor-bar-fill" style="width: ${((factors.countScore || 10) / 25) * 100}%; background: ${getFactorColor(factors.countScore || 10, 25)};"></div>
                            </div>
                        </div>
                        
                        <div class="factor-row">
                            <div class="factor-header">
                                <span>Severity Score</span>
                                <span style="color: ${getFactorColor(factors.severityScore || 10, 25)}">${factors.severityScore || 10}/25</span>
                            </div>
                            <div class="factor-bar-bg">
                                <div class="factor-bar-fill" style="width: ${((factors.severityScore || 10) / 25) * 100}%; background: ${getFactorColor(factors.severityScore || 10, 25)};"></div>
                            </div>
                        </div>
                        
                        <div class="factor-row">
                            <div class="factor-header">
                                <span>Critical Vulnerabilities</span>
                                <span style="color: ${getFactorColor(factors.criticalScore || 8, 20)}">${factors.criticalScore || 8}/20</span>
                            </div>
                            <div class="factor-bar-bg">
                                <div class="factor-bar-fill" style="width: ${((factors.criticalScore || 8) / 20) * 100}%; background: ${getFactorColor(factors.criticalScore || 8, 20)};"></div>
                            </div>
                        </div>
                        
                        <div class="factor-row">
                            <div class="factor-header">
                                <span>Recent Exploits</span>
                                <span style="color: ${getFactorColor(factors.recentScore || 5, 15)}">${factors.recentScore || 5}/15</span>
                            </div>
                            <div class="factor-bar-bg">
                                <div class="factor-bar-fill" style="width: ${((factors.recentScore || 5) / 15) * 100}%; background: ${getFactorColor(factors.recentScore || 5, 15)};"></div>
                            </div>
                        </div>
                        
                        <div class="factor-row">
                            <div class="factor-header">
                                <span>Industry Risk</span>
                                <span style="color: ${getFactorColor(factors.industryScore || 8, 15)}">${factors.industryScore || 8}/15</span>
                            </div>
                            <div class="factor-bar-bg">
                                <div class="factor-bar-fill" style="width: ${((factors.industryScore || 8) / 15) * 100}%; background: ${getFactorColor(factors.industryScore || 8, 15)};"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="recommendation-box">
                        <i class="fas fa-lightbulb" style="color: var(--accent-blue);"></i>
                        <p style="font-size: 0.75rem; margin-top: 5px;">
                            ${vendor.risk_level === 'High' ? '⚠️ High risk - Consider alternatives or request security audit' :
                              vendor.risk_level === 'Medium' ? '📊 Medium risk - Regular monitoring recommended' :
                              '✅ Low risk - Acceptable for standard use'}
                        </p>
                    </div>
                </div>
            `;
        }

        // Main comparison function
        async function compareVendors() {
            const vendor1Id = document.getElementById('vendor1Select').value;
            const vendor2Id = document.getElementById('vendor2Select').value;
            const vendor3Id = document.getElementById('vendor3Select').value;
            
            const selectedIds = [vendor1Id, vendor2Id, vendor3Id].filter(id => id);
            
            if (selectedIds.length < 2) {
                showToast('Please select at least 2 vendors to compare', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/vendors`);
                const data = await response.json();
                const allVendors = data.data || [];
                
                const selectedVendors = allVendors.filter(v => selectedIds.includes(String(v.id)));
                
                const winner = findWinner(selectedVendors);
                
                let html = '<div class="comparison-grid">';
                
                for (const vendor of selectedVendors) {
                    const isWinner = winner && winner.id === vendor.id;
                    html += renderVendorCard(vendor, isWinner);
                }
                
                html += '</div>';
                
                // Add summary recommendation
                if (winner) {
                    html += `
                        <div style="margin-top: 30px; background: var(--card-bg); border-radius: 16px; padding: 20px; text-align: center; border: 1px solid var(--light-blue);">
                            <i class="fas fa-chart-line" style="font-size: 2rem; color: #2ed573;"></i>
                            <h3 style="margin: 10px 0;">Recommendation</h3>
                            <p><strong>${winner.name}</strong> has the lowest risk score (${winner.risk_score}/100) among compared vendors.</p>
                            <p style="margin-top: 10px; font-size: 0.85rem; color: var(--text-light-gray);">
                                Consider prioritizing ${winner.name} for your vendor selection based on security posture.
                            </p>
                        </div>
                    `;
                }
                
                document.getElementById('comparisonResults').innerHTML = html;
                
                // Animate circles
                setTimeout(() => {
                    document.querySelectorAll('.risk-circle .progress').forEach(circle => {
                        const parent = circle.closest('.vendor-card');
                        const scoreText = parent.querySelector('.risk-score-number');
                        if (scoreText) {
                            const score = parseInt(scoreText.innerText);
                            const circumference = 2 * Math.PI * 60;
                            const dashArray = (score / 100) * circumference;
                            circle.style.strokeDasharray = `${dashArray} ${circumference}`;
                        }
                    });
                }, 100);
                
            } catch (error) {
                console.error('Comparison error:', error);
                showToast('Failed to compare vendors', 'error');
            }
        }

        // Initialize page
        loadVendors();
    </script>
</body>
</html>
