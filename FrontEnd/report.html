<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk Reports | VendorRisk AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="icon" type="image/png" href="assets/icon.png">
    <style>
        :root {
            --dark-blue: #0A1128;
            --light-blue: #0077B6;
            --accent-blue: #00B4D8;
            --text-white: #E0FBFC;
            --text-light-gray: #B3C4EF;
            --card-bg: rgba(16, 26, 58, 0.8);
            --high-risk: #ff4757;
            --medium-risk: #ffa502;
            --low-risk: #2ed573;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--dark-blue); 
            color: var(--text-white); 
            font-family: 'Inter', sans-serif;
        }

        nav {
            height: 70px;
            border-bottom: 1px solid var(--light-blue);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            background: rgba(10, 17, 40, 0.95);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; color: var(--accent-blue); }
        .logo img { width: 40px; }
        .nav-links a { text-decoration: none; color: var(--text-light-gray); margin-left: 20px; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent-blue); }

        .container {
            max-width: 1200px;
            margin: 100px auto 50px;
            padding: 0 20px;
        }

        /* Generator Section */
        .generator-section {
            background: var(--card-bg);
            border: 1px solid var(--light-blue);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .vendor-selector {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .select-group {
            flex: 1;
            min-width: 200px;
        }

        .select-group label {
            display: block;
            font-size: 0.7rem;
            color: var(--accent-blue);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .vendor-select {
            width: 100%;
            padding: 12px;
            background: #050a1a;
            border: 1px solid var(--light-blue);
            color: white;
            border-radius: 10px;
            font-size: 1rem;
        }

        .generate-btn {
            background: var(--light-blue);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .generate-btn:hover {
            background: var(--accent-blue);
            transform: translateY(-2px);
        }

        /* Report Preview */
        .report-preview {
            background: var(--card-bg);
            border: 1px solid var(--light-blue);
            border-radius: 20px;
            padding: 30px;
            display: none;
        }

        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--light-blue);
        }

        .download-btn {
            background: #2ed573;
            color: #0A1128;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .download-btn:hover {
            background: #1eb960;
            transform: translateY(-2px);
        }

        /* ========== PROFESSIONAL PDF STYLES ========== */
        #reportContent {
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }

        .pdf-report {
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            line-height: 1.5;
            color: #1a1a2e;
            background: white;
        }

        .pdf-header {
            background: linear-gradient(135deg, #0A1128 0%, #0077B6 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .pdf-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .pdf-header .subtitle {
            font-size: 14px;
            opacity: 0.9;
        }

        .pdf-header .date {
            font-size: 12px;
            margin-top: 15px;
            opacity: 0.7;
        }

        .pdf-section {
            padding: 30px 40px;
            border-bottom: 1px solid #e0e0e0;
        }

        .pdf-section-title {
            font-size: 18px;
            font-weight: 700;
            color: #0077B6;
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 2px solid #0077B6;
            display: inline-block;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 15px;
        }

        .info-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #0077B6;
        }

        .info-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #666;
            letter-spacing: 1px;
        }

        .info-value {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            margin-top: 5px;
        }

        .risk-score-large {
            text-align: center;
            padding: 25px;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 16px;
            margin: 20px 0;
        }

        .risk-score-number {
            font-size: 48px;
            font-weight: 800;
        }

        .risk-score-label {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }

        .risk-badge-pdf {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            margin-top: 10px;
        }

        .risk-high-pdf { background: #ff4757; color: white; }
        .risk-medium-pdf { background: #ffa502; color: white; }
        .risk-low-pdf { background: #2ed573; color: #1a1a2e; }

        .factors-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }

        .factors-table th {
            background: #0077B6;
            color: white;
            padding: 12px;
            text-align: left;
            font-size: 13px;
        }

        .factors-table td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 13px;
        }

        .factors-table tr:last-child td {
            border-bottom: none;
        }

        .progress-bar-bg {
            background: #e0e0e0;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            width: 120px;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 4px;
        }

        .recommendation-box {
            background: #e8f5e9;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #2ed573;
            margin: 20px 0;
        }

        .recommendation-box p {
            margin-bottom: 8px;
            font-size: 13px;
        }

        .footer-note {
            background: #f8f9fa;
            padding: 20px 40px;
            text-align: center;
            font-size: 10px;
            color: #999;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2ed573;
            color: #0A1128;
            padding: 12px 20px;
            border-radius: 8px;
            display: none;
            z-index: 2000;
        }
        .toast.error { background: #ff4757; color: white; }
    </style>
</head>
<body>
    <nav>
        <div class="logo"><img src="assets/logo.png" alt="Logo"><span>VendorRisk-AI</span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="analyze.html">Analyze</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="compare.html">Compare</a>
            <a href="monitor.html">Monitor</a>
            <a href="report.html" class="active">Report</a>
        </div>
    </nav>

    <div class="container">
        <div class="generator-section">
            <div class="section-title">
                <i class="fas fa-file-pdf" style="color: #ff4757;"></i>
                Generate Professional Risk Report
            </div>
            <div class="vendor-selector">
                <div class="select-group">
                    <label><i class="fas fa-building"></i> Select Vendor</label>
                    <select id="vendorSelect" class="vendor-select">
                        <option value="">-- Select Vendor --</option>
                    </select>
                </div>
                <div class="select-group">
                    <label><i class="fas fa-chart-line"></i> Report Type</label>
                    <select id="reportType" class="vendor-select">
                        <option value="full">Full Security Report</option>
                        <option value="executive">Executive Summary</option>
                    </select>
                </div>
                <button class="generate-btn" onclick="generateReport()">
                    <i class="fas fa-file-alt"></i> Generate Report
                </button>
            </div>
        </div>

        <div id="reportPreview" class="report-preview">
            <div class="report-header">
                <h3><i class="fas fa-chart-line"></i> Report Preview</h3>
                <button class="download-btn" onclick="downloadPDF()">
                    <i class="fas fa-download"></i> Download PDF
                </button>
            </div>
            <div id="reportContent"></div>
        </div>
    </div>

    <div id="toast" class="toast"><i class="fas fa-info-circle"></i><span>Message</span></div>

    <script>
        const API_BASE = 'http://localhost:5001';

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.querySelector('span').innerText = message;
            toast.className = 'toast ' + type;
            toast.style.display = 'flex';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        async function loadVendors() {
            try {
                const response = await fetch(`${API_BASE}/api/vendors`);
                const data = await response.json();
                const vendors = data.data || [];
                
                const select = document.getElementById('vendorSelect');
                select.innerHTML = '<option value="">-- Select Vendor --</option>' +
                    vendors.map(v => `<option value="${v.id}">${v.name} (${v.risk_level} - ${v.risk_score}/100)</option>`).join('');
                    
                if (vendors.length === 0) {
                    showToast('No vendors found. Please analyze vendors first.', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Failed to load vendors', 'error');
            }
        }

        function getRiskClass(score) {
            if (score >= 70) return 'high';
            if (score >= 40) return 'medium';
            return 'low';
        }

        function getRiskText(score) {
            if (score >= 70) return 'High Risk';
            if (score >= 40) return 'Medium Risk';
            return 'Low Risk';
        }

        function getRiskColor(score) {
            if (score >= 70) return '#ff4757';
            if (score >= 40) return '#ffa502';
            return '#2ed573';
        }

        function getRecommendation(vendor) {
            if (vendor.risk_level === 'High') {
                return `⚠️ CRITICAL: ${vendor.name} presents HIGH security risk (Score: ${vendor.risk_score}/100). Immediate action required. Consider requesting a security audit, implementing additional controls, or exploring alternative vendors with better security posture.`;
            } else if (vendor.risk_level === 'Medium') {
                return `📊 MODERATE: ${vendor.name} presents MEDIUM security risk (Score: ${vendor.risk_score}/100). Regular quarterly security reviews recommended. Request vendor's SOC 2 or ISO 27001 certification and establish continuous monitoring.`;
            } else {
                return `✅ ACCEPTABLE: ${vendor.name} presents LOW security risk (Score: ${vendor.risk_score}/100). Standard annual security review recommended. Keep vendor contact information updated and monitor for any significant security changes.`;
            }
        }

        function generateFullReport(vendor) {
            const riskColor = getRiskColor(vendor.risk_score);
            const riskClass = getRiskClass(vendor.risk_score);
            const recommendation = getRecommendation(vendor);
            
            let factors = {};
            try {
                factors = typeof vendor.factor_breakdown === 'string' ? JSON.parse(vendor.factor_breakdown) : (vendor.factor_breakdown || {});
            } catch(e) {
                factors = {};
            }

            const currentDate = new Date().toLocaleDateString('en-US', {
                year: 'numeric', month: 'long', day: 'numeric'
            });

            return `
                <div class="pdf-report">
                    <div class="pdf-header">
                        <h1>VENDOR RISK ASSESSMENT REPORT</h1>
                        <div class="subtitle">Comprehensive Security Analysis</div>
                        <div class="date">Report Date: ${currentDate} | Report ID: VRA-${Date.now()}</div>
                    </div>
                    
                    <div class="pdf-section">
                        <div class="pdf-section-title">1. Executive Summary</div>
                        <div class="risk-score-large">
                            <div class="risk-score-number" style="color: ${riskColor};">${vendor.risk_score}/100</div>
                            <div class="risk-score-label">Overall Risk Score</div>
                            <span class="risk-badge-pdf risk-${riskClass}-pdf">${vendor.risk_level} RISK</span>
                        </div>
                        <div class="recommendation-box">
                            <strong>🔍 Assessment Summary</strong>
                            <p style="margin-top: 10px;">${recommendation}</p>
                        </div>
                    </div>
                    
                    <div class="pdf-section">
                        <div class="pdf-section-title">2. Vendor Information</div>
                        <div class="info-grid">
                            <div class="info-card">
                                <div class="info-label">Vendor Name</div>
                                <div class="info-value">${vendor.name}</div>
                            </div>
                            <div class="info-card">
                                <div class="info-label">Industry Sector</div>
                                <div class="info-value">${vendor.industry || 'Not Specified'}</div>
                            </div>
                            <div class="info-card">
                                <div class="info-label">Assessment Date</div>
                                <div class="info-value">${vendor.date || currentDate}</div>
                            </div>
                            <div class="info-card">
                                <div class="info-label">Report Version</div>
                                <div class="info-value">1.0</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="pdf-section">
                        <div class="pdf-section-title">3. Vulnerability Statistics</div>
                        <table class="factors-table">
                            <thead>
                                <tr><th>Metric</th><th>Value</th><th>Severity Level</th></tr>
                            </thead>
                            <tbody>
                                <tr><td>Total CVEs Found</td><td><strong>${vendor.vulnerabilities || 0}</strong></td>
                                    <td>${vendor.vulnerabilities > 100 ? '🔴 Critical' : (vendor.vulnerabilities > 50 ? '🟠 High' : '🟢 Low')}</td>
                                </tr>
                                <tr><td>Critical Severity CVEs</td><td><strong>${vendor.critical_count || 0}</strong></td>
                                    <td>${vendor.critical_count > 5 ? '🔴 Critical' : (vendor.critical_count > 0 ? '🟠 High' : '🟢 Low')}</td>
                                </tr>
                                <tr><td>Average CVSS Score</td><td><strong>${vendor.avg_severity || 'N/A'}/10</strong></td>
                                    <td>${vendor.avg_severity > 7 ? '🔴 Critical' : (vendor.avg_severity > 5 ? '🟠 High' : '🟢 Low')}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <div class="pdf-section">
                        <div class="pdf-section-title">4. Risk Factor Analysis</div>
                        <table class="factors-table">
                            <thead><tr><th>Risk Factor</th><th>Score</th><th>Max</th><th>Performance</th></tr></thead>
                            <tbody>
                                <tr><td>Vulnerability Count</td><td><strong>${factors.countScore || 10}</strong></td><td>25</td>
                                    <td><div class="progress-bar-bg"><div class="progress-bar-fill" style="width: ${((factors.countScore || 10)/25)*100}%; background: ${getRiskColor(((factors.countScore || 10)/25)*100)};"></div></div></td></tr>
                                <tr><td>Severity Score</td><td><strong>${factors.severityScore || 10}</strong></td><td>25</td>
                                    <td><div class="progress-bar-bg"><div class="progress-bar-fill" style="width: ${((factors.severityScore || 10)/25)*100}%; background: ${getRiskColor(((factors.severityScore || 10)/25)*100)};"></div></div></td></tr>
                                <tr><td>Critical Vulnerabilities</td><td><strong>${factors.criticalScore || 8}</strong></td><td>20</td>
                                    <td><div class="progress-bar-bg"><div class="progress-bar-fill" style="width: ${((factors.criticalScore || 8)/20)*100}%; background: ${getRiskColor(((factors.criticalScore || 8)/20)*100)};"></div></div></td></tr>
                                <tr><td>Recent Exploits</td><td><strong>${factors.recentScore || 5}</strong></td><td>15</td>
                                    <td><div class="progress-bar-bg"><div class="progress-bar-fill" style="width: ${((factors.recentScore || 5)/15)*100}%; background: ${getRiskColor(((factors.recentScore || 5)/15)*100)};"></div></div></td></tr>
                                <tr><td>Industry Risk</td><td><strong>${factors.industryScore || 8}</strong></td><td>15</td>
                                    <td><div class="progress-bar-bg"><div class="progress-bar-fill" style="width: ${((factors.industryScore || 8)/15)*100}%; background: ${getRiskColor(((factors.industryScore || 8)/15)*100)};"></div></div></td></tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <div class="pdf-section">
                        <div class="pdf-section-title">5. Recommendations</div>
                        <div class="recommendation-box">
                            <strong>📋 Action Items</strong>
                            <p style="margin-top: 10px;">• Review vendor security documentation and policies</p>
                            <p>• Request SOC 2 / ISO 27001 certification evidence</p>
                            <p>• Subscribe to vendor security advisory mailing list</p>
                            <p>• Set up continuous monitoring for new vulnerabilities</p>
                            <p>• Establish incident response communication channels</p>
                        </div>
                    </div>
                    
                    <div class="footer-note">
                        <p>This report was generated automatically by VendorRisk AI - AI-Powered Vendor Risk Assessment Platform</p>
                        <p>© 2024 VendorRisk AI. All rights reserved. | Confidential Security Report</p>
                        <p>For questions or support, contact security@vendorrisk.ai</p>
                    </div>
                </div>
            `;
        }

        function generateExecutiveReport(vendor) {
            const riskColor = getRiskColor(vendor.risk_score);
            const riskClass = getRiskClass(vendor.risk_score);
            const recommendation = getRecommendation(vendor);
            const currentDate = new Date().toLocaleDateString('en-US', {
                year: 'numeric', month: 'long', day: 'numeric'
            });

            return `
                <div class="pdf-report">
                    <div class="pdf-header">
                        <h1>EXECUTIVE SUMMARY</h1>
                        <div class="subtitle">Vendor Risk Assessment - ${vendor.name}</div>
                        <div class="date">${currentDate}</div>
                    </div>
                    
                    <div class="pdf-section">
                        <div class="risk-score-large">
                            <div class="risk-score-number" style="color: ${riskColor};">${vendor.risk_score}/100</div>
                            <div class="risk-score-label">Overall Risk Score</div>
                            <span class="risk-badge-pdf risk-${riskClass}-pdf">${vendor.risk_level} RISK</span>
                        </div>
                        <div class="recommendation-box">
                            <strong>Executive Recommendation</strong>
                            <p style="margin-top: 10px;">${recommendation}</p>
                        </div>
                    </div>
                    
                    <div class="pdf-section">
                        <div class="pdf-section-title">Key Findings</div>
                        <div class="info-grid">
                            <div class="info-card">
                                <div class="info-label">Vendor</div>
                                <div class="info-value">${vendor.name}</div>
                            </div>
                            <div class="info-card">
                                <div class="info-label">Total CVEs</div>
                                <div class="info-value">${vendor.vulnerabilities || 0}</div>
                            </div>
                            <div class="info-card">
                                <div class="info-label">Critical CVEs</div>
                                <div class="info-value">${vendor.critical_count || 0}</div>
                            </div>
                            <div class="info-card">
                                <div class="info-label">Risk Level</div>
                                <div class="info-value" style="color: ${riskColor};">${vendor.risk_level}</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="footer-note">
                        <p>Generated by VendorRisk AI - Confidential Risk Assessment Report</p>
                    </div>
                </div>
            `;
        }

        async function generateReport() {
            const vendorId = document.getElementById('vendorSelect').value;
            const reportType = document.getElementById('reportType').value;
            
            if (!vendorId) {
                showToast('Please select a vendor', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/vendors`);
                const data = await response.json();
                const vendors = data.data || [];
                const vendor = vendors.find(v => v.id == vendorId);
                
                if (!vendor) {
                    showToast('Vendor not found', 'error');
                    return;
                }
                
                let reportHTML = '';
                if (reportType === 'full') {
                    reportHTML = generateFullReport(vendor);
                } else {
                    reportHTML = generateExecutiveReport(vendor);
                }
                
                document.getElementById('reportContent').innerHTML = reportHTML;
                document.getElementById('reportPreview').style.display = 'block';
                
                showToast(`Report generated for ${vendor.name}`);
                document.getElementById('reportPreview').scrollIntoView({ behavior: 'smooth' });
                
            } catch (error) {
                console.error('Error:', error);
                showToast('Failed to generate report', 'error');
            }
        }

        function downloadPDF() {
            const element = document.getElementById('reportContent');
            const opt = {
                margin: [0.5, 0.5, 0.5, 0.5],
                filename: `vendor-risk-report-${Date.now()}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, letterRendering: true, useCORS: true },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
            showToast('PDF downloaded successfully!');
        }

        loadVendors();
    </script>
</body>
</html>
