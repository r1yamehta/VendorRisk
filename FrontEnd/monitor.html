<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk Monitor | VendorRisk AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --dark-blue: #0A1128;
            --light-blue: #0077B6;
            --accent-blue: #00B4D8;
            --text-white: #E0FBFC;
            --text-light-gray: #B3C4EF;
            --card-bg: rgba(16, 26, 58, 0.8);
            --high-risk: #ff4757;
            --medium-risk: #ffa502;
            --low-risk: #2ed573;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--dark-blue); 
            color: var(--text-white); 
            font-family: 'Inter', sans-serif;
        }

        nav {
            height: 70px;
            border-bottom: 1px solid var(--light-blue);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            background: rgba(10, 17, 40, 0.9);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; color: var(--accent-blue); }
        .logo img { width: 40px; }
        .nav-links a { text-decoration: none; color: var(--text-light-gray); margin-left: 20px; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent-blue); }

        .container { max-width: 1400px; margin: 100px auto 50px; padding: 0 20px; }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--light-blue);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }
        .stat-card i { font-size: 2rem; margin-bottom: 10px; }
        .stat-value { font-size: 2rem; font-weight: 700; }
        .stat-label { font-size: 0.7rem; color: var(--text-light-gray); }

        /* Alerts Section */
        .alerts-section {
            background: var(--card-bg);
            border: 1px solid var(--light-blue);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .section-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .alert-item {
            background: rgba(0, 0, 0, 0.3);
            border-left: 4px solid;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .alert-critical { border-left-color: #ff4757; }
        .alert-warning { border-left-color: #ffa502; }
        .alert-info { border-left-color: #2ed573; }
        .alert-time { font-size: 0.7rem; color: var(--text-light-gray); }

        /* Vendor Grid */
        .vendor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }
        .vendor-monitor-card {
            background: var(--card-bg);
            border: 1px solid var(--light-blue);
            border-radius: 16px;
            padding: 20px;
            transition: 0.3s;
        }
        .vendor-monitor-card:hover { transform: translateY(-5px); }
        .vendor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .vendor-name { font-size: 1.2rem; font-weight: 700; color: var(--accent-blue); }
        .risk-trend-up { color: #ff4757; }
        .risk-trend-down { color: #2ed573; }
        .risk-trend-stable { color: var(--text-light-gray); }
        
        .metric-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }
        .check-btn {
            width: 100%;
            padding: 10px;
            background: var(--light-blue);
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
        }
        .check-btn:hover { background: var(--accent-blue); }
        .checking { opacity: 0.6; cursor: not-allowed; }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2ed573;
            color: #0A1128;
            padding: 12px 20px;
            border-radius: 8px;
            display: none;
            z-index: 2000;
        }
        .toast.error { background: #ff4757; color: white; }
        .toast.warning { background: #ffa502; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .alert-badge {
            animation: pulse 1s infinite;
            background: #ff4757;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo"><img src="assets/logo.png" alt="Logo"><span>VendorRisk-AI</span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="analyze.html">Analyze</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="vendor-comparison.html">Compare</a>
            <a href="monitor.html" class="active">Monitor</a>
        </div>
    </nav>

    <div class="container">
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <i class="fas fa-shield-virus"></i>
                <div class="stat-value" id="totalVendors">0</div>
                <div class="stat-label">Monitored Vendors</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-bell"></i>
                <div class="stat-value" id="newAlerts">0</div>
                <div class="stat-label">New Alerts</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-chart-line"></i>
                <div class="stat-value" id="riskIncrease">0</div>
                <div class="stat-label">Risk Increase</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-check-circle"></i>
                <div class="stat-value" id="secureVendors">0</div>
                <div class="stat-label">Secure Vendors</div>
            </div>
        </div>

        <div class="alerts-section" id="alertsSection">
            <div class="section-title">
                <i class="fas fa-bell" style="color: #ffa502;"></i>
                Recent Risk Alerts
                <span id="alertCount" class="alert-badge" style="display: none;">0</span>
            </div>
            <div id="alertsList">
                <p style="text-align: center; padding: 20px;">No recent alerts</p>
            </div>
        </div>

        <div class="section-title">
            <i class="fas fa-microchip"></i>
            Vendor Risk Monitoring
        </div>
        <div class="vendor-grid" id="vendorGrid"></div>
    </div>

    <div id="toast" class="toast"><i class="fas fa-info-circle"></i><span>Message</span></div>

    <script>
        const API_BASE = 'http://localhost:5001';

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.querySelector('span').innerText = message;
            toast.className = 'toast ' + type;
            toast.style.display = 'flex';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        async function loadMonitors() {
            try {
                const response = await fetch(`${API_BASE}/api/vendors`);
                const data = await response.json();
                const vendors = data.data || [];
                
                document.getElementById('totalVendors').innerText = vendors.length;
                document.getElementById('secureVendors').innerText = vendors.filter(v => v.risk_level === 'Low').length;
                
                const riskIncrease = vendors.filter(v => v.risk_score > 60).length;
                document.getElementById('riskIncrease').innerText = riskIncrease;
                
                const vendorGrid = document.getElementById('vendorGrid');
                if (vendors.length === 0) {
                    vendorGrid.innerHTML = '<p style="text-align:center;">No vendors found. Go to Analyze page first.</p>';
                    return;
                }
                
                vendorGrid.innerHTML = vendors.map(vendor => `
                    <div class="vendor-monitor-card" data-id="${vendor.id}" data-name="${vendor.name}">
                        <div class="vendor-header">
                            <span class="vendor-name">${vendor.name}</span>
                            <span class="risk-badge ${vendor.risk_level === 'High' ? 'risk-high' : (vendor.risk_level === 'Medium' ? 'risk-medium' : 'risk-low')}">
                                ${vendor.risk_level}
                            </span>
                        </div>
                        <div class="metric-row">
                            <span><i class="fas fa-chart-simple"></i> Risk Score</span>
                            <strong style="color: ${getRiskColor(vendor.risk_score)}">${vendor.risk_score}/100</strong>
                        </div>
                        <div class="metric-row">
                            <span><i class="fas fa-bug"></i> CVEs Found</span>
                            <strong>${vendor.vulnerabilities || 0}</strong>
                        </div>
                        <div class="metric-row">
                            <span><i class="fas fa-chart-line"></i> Critical CVEs</span>
                            <strong>${vendor.critical_count || 0}</strong>
                        </div>
                        <button class="check-btn" onclick="checkVendorRisk(${vendor.id}, '${vendor.name}')">
                            <i class="fas fa-sync-alt"></i> Check for New Vulnerabilities
                        </button>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('Error:', error);
                showToast('Failed to load vendors', 'error');
            }
        }

        function getRiskColor(score) {
            if (score >= 70) return '#ff4757';
            if (score >= 40) return '#ffa502';
            return '#2ed573';
        }

        async function checkVendorRisk(vendorId, vendorName) {
            const btn = document.querySelector(`.vendor-monitor-card[data-id="${vendorId}"] .check-btn`);
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Scanning...';
            btn.disabled = true;
            btn.classList.add('checking');
            
            try {
                const response = await fetch(`${API_BASE}/api/monitor/check`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ vendorId, vendorName })
                });
                const data = await response.json();
                
                if (data.success && data.newVulnerabilities > 0) {
                    showToast(`⚠️ ${vendorName}: ${data.newVulnerabilities} new vulnerabilities found!`, 'warning');
                    loadMonitors(); // Refresh
                } else if (data.hasNewCritical) {
                    showToast(`🔴 CRITICAL: New severe vulnerability found for ${vendorName}!`, 'error');
                } else {
                    showToast(`✅ ${vendorName} - No new vulnerabilities detected`, 'success');
                }
            } catch (error) {
                showToast(`Failed to check ${vendorName}`, 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
                btn.classList.remove('checking');
            }
        }

        async function loadAlerts() {
            try {
                const response = await fetch(`${API_BASE}/api/alerts`);
                const data = await response.json();
                const alerts = data.data || [];
                
                const alertCount = alerts.filter(a => !a.is_read).length;
                document.getElementById('newAlerts').innerText = alertCount;
                
                const alertBadge = document.getElementById('alertCount');
                if (alertCount > 0) {
                    alertBadge.style.display = 'inline-block';
                    alertBadge.innerText = alertCount;
                } else {
                    alertBadge.style.display = 'none';
                }
                
                const alertsList = document.getElementById('alertsList');
                if (alerts.length === 0) {
                    alertsList.innerHTML = '<p style="text-align: center; padding: 20px;">✅ No new alerts - All vendors up to date</p>';
                    return;
                }
                
                alertsList.innerHTML = alerts.slice(0, 5).map(alert => `
                    <div class="alert-item alert-${alert.severity === 'Critical' ? 'critical' : (alert.severity === 'Warning' ? 'warning' : 'info')}">
                        <div>
                            <strong>${alert.vendor_name}</strong>
                            <p style="font-size: 0.8rem; margin-top: 5px;">${alert.message}</p>
                        </div>
                        <div class="alert-time">
                            ${new Date(alert.created_at).toLocaleString()}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Alerts error:', error);
            }
        }

        // Auto-refresh every 30 seconds
        setInterval(() => {
            loadMonitors();
            loadAlerts();
        }, 30000);
        
        loadMonitors();
        loadAlerts();
    </script>
</body>
</html>
